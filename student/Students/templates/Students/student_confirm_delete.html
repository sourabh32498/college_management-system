{% extends 'Students/base.html' %}

{% block title %}Delete Student | Student Management{% endblock %}

{% block content %}
<div class="row justify-content-center auth-shell">
  <div class="col-md-7 col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <h1 class="h4 mb-2">Delete Student</h1>
        <p class="text-body-secondary">This action will permanently remove <strong>{{ object }}</strong>.</p>
        <form method="post">
          {% csrf_token %}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'students:list' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
